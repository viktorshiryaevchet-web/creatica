<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Столярный цех</title>
    <script src="https://unpkg.com/pocketbase@0.21.5/dist/pocketbase.umd.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- АВТОРИЗАЦИЯ -->
        <div id="authScreen">
            <div class="card">
                <h1>🔐 Вход в систему</h1>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="loginEmail" placeholder="stolyar@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль:</label>
                    <input type="password" id="loginPassword" placeholder="******">
                </div>
                <button id="loginBtn" class="btn btn-primary" style="width:100%;">Войти</button>
                <div id="loginMessage" class="message"></div>
            </div>
        </div>

        <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
        <div id="mainScreen" style="display:none;">

            <!-- Шапка -->
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h1>🔨 Столярный цех</h1>
                <div>
                    <span id="userNameDisplay" style="font-weight:600; margin-right:16px;"></span>
                    <button id="logoutBtn" class="btn btn-danger" style="padding:8px 16px;">Выйти</button>
                </div>
            </div>

            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="active">🛠 В работе</button>
                <button class="tab-btn" data-tab="development">📐 Разработка</button>
                <button class="tab-btn" data-tab="completed">✅ Готово</button>
            </div>

            <!-- ВКЛАДКА: В РАБОТЕ -->
            <div id="tabActive" class="tab-content active">
                <div id="ordersListActive"><p class="empty-text">Загрузка...</p></div>
            </div>

            <!-- ВКЛАДКА: РАЗРАБОТКА -->
            <div id="tabDevelopment" class="tab-content" style="display:none;">
                <div id="ordersListDevelopment"><p class="empty-text">Загрузка...</p></div>
            </div>

            <!-- ВКЛАДКА: ГОТОВО -->
            <div id="tabCompleted" class="tab-content" style="display:none;">
                <div id="ordersListCompleted"><p class="empty-text">Загрузка...</p></div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
