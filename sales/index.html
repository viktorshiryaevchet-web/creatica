<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мебельный цех — Отдел продаж</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    <script src="https://unpkg.com/pocketbase@0.21.5/dist/pocketbase.umd.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- ============================================ -->
        <!-- АВТОРИЗАЦИЯ -->
        <!-- ============================================ -->
        <div id="authScreen">
            <div class="card">
                <div class="logo">
                    <div class="logo-icon">📋</div>
                </div>
                <h1>Добро пожаловать</h1>
                <p class="subtitle">Отдел продаж</p>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="sales@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button id="loginBtn" class="btn btn-primary">Войти</button>
                <div id="loginMessage" class="message"></div>
            </div>
        </div>

        <!-- ============================================ -->
        <!-- ОСНОВНОЙ ИНТЕРФЕЙС (после входа) -->
        <!-- ============================================ -->
        <div id="mainScreen" style="display:none;">

            <!-- ШАПКА -->
            <div class="header">
                <h1>📋 Мебельный цех</h1>
                <div class="header-right">
                    <span class="user-name" id="userNameDisplay">Менеджер</span>
                    <button id="logoutBtn" class="btn btn-danger btn-sm">Выйти</button>
                </div>
            </div>

            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="myOrders">📦 Мои заказы</button>
                <button class="tab-btn" data-tab="newOrder">➕ Новый заказ</button>
            </div>

            <!-- ============================================ -->
            <!-- ВКЛАДКА: МОИ ЗАКАЗЫ -->
            <!-- ============================================ -->
            <div id="tabMyOrders" class="tab-content active">
                <div class="card">
                    <h2>Мои заказы</h2>
                    <div id="ordersList">
                        <p class="empty-text">Загрузка...</p>
                    </div>
                </div>
            </div>

            <!-- ============================================ -->
            <!-- ВКЛАДКА: НОВЫЙ ЗАКАЗ / РЕДАКТИРОВАНИЕ -->
            <!-- ============================================ -->
            <div id="tabNewOrder" class="tab-content" style="display:none;">

                <!-- Информация о заказе -->
                <div class="card">
                    <h2>➕ Новый заказ</h2>
                    <div class="form-group">
                        <label>ФИО клиента:</label>
                        <input type="text" id="clientName" placeholder="Введите ФИО клиента">
                    </div>
                    <div class="form-group">
                        <label>Дата сдачи:</label>
                        <input type="date" id="deliveryDate">
                    </div>
                    <div class="form-group">
                        <label>Комментарий к заказу:</label>
                        <textarea id="orderComment" rows="4" placeholder="Дополнительная информация..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Файл (Word/PDF):</label>
                        <input type="file" id="orderFile" accept=".doc,.docx,.pdf">
                        <small style="color:#888; display:block; margin-top:4px;">Можно загрузить чертёж, спецификацию или другой документ</small>
                    </div>
                    <div class="form-group">
                        <label style="display:flex; align-items:center; cursor:pointer;">
                            <input type="checkbox" id="needsDevelopment" style="width:18px;height:18px;margin-right:10px;cursor:pointer;">
                            Требуется разработка (конструктор)
                        </label>
                    </div>
                </div>

                <!-- Добавление позиций -->
                <div class="card">
                    <h2>Добавить позицию</h2>
                    <div class="form-group" style="position:relative;">
                        <label>Мебель:</label>
                        <input type="text" id="furnitureSearch" placeholder="Начните вводить название мебели...">
                        <div id="suggestions" class="suggestions"></div>
                        <input type="text" id="furnitureManual" placeholder="Введите название мебели вручную..." style="display:none; margin-top:8px;">
                    </div>
                    <div class="form-group">
                        <label>Ткань:</label>
                        <input type="text" id="fabric" placeholder="Ткань">
                    </div>
                    <div class="form-group">
                        <label>Цвет опор:</label>
                        <input type="text" id="colorOpor" placeholder="Цвет опор">
                    </div>
                    <div class="form-group">
                        <label>Отделка:</label>
                        <input type="text" id="finish" placeholder="Отделка">
                    </div>
                    <div class="form-group">
                        <label>Количество:</label>
                        <input type="number" id="quantity" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label>Комплектность:</label>
                        <input type="text" id="komplektnost" placeholder="Комплектность (например: с ящиком, с полкой...)">
                    </div>
                    <div class="form-group">
                        <label>Количество подушек:</label>
                        <input type="text" id="podushki" placeholder="Например: 2 шт, в комплекте, без подушек...">
                    </div>
                    <button id="addItemBtn" class="btn btn-secondary">➕ Добавить позицию</button>
                </div>

                <!-- Список позиций -->
                <div class="card">
                    <h2>Позиции в заказе</h2>
                    <div id="itemsList">
                        <p class="empty-text">Нет добавленных позиций</p>
                    </div>
                </div>

                <button id="createOrderBtn" class="btn btn-primary">✅ Создать заказ</button>
                <div id="resultMessage" class="message"></div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
